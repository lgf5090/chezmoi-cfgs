# Alacritty 0.16+ TOML configuration.

[general]
live_config_reload = true
ipc_socket = true
working_directory = "None"

[env]
TERM = "alacritty"

[window]
dimensions = { columns = 120, lines = 34 }
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "None"
decorations_theme_variant = "Dark"
opacity = 0.96
blur = false
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true
class = { instance = "Alacritty", general = "Alacritty" }
resize_increments = true
level = "Normal"

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "Hack Nerd Font", style = "Regular" }
bold = { family = "Hack Nerd Font", style = "Bold" }
italic = { family = "Hack Nerd Font", style = "Italic" }
bold_italic = { family = "Hack Nerd Font", style = "Bold Italic" }
size = 12.0
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }
builtin_box_drawing = true

[colors.primary]
foreground = "#f8f8f2"
background = "#282a36"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#282a36"
cursor = "#f8f8f2"

[colors.vi_mode_cursor]
text = "#282a36"
cursor = "#f1fa8c"

[colors.search.matches]
foreground = "#282a36"
background = "#ff5555"

[colors.search.focused_match]
foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.start]
foreground = "#282a36"
background = "#f1fa8c"

[colors.hints.end]
foreground = "#282a36"
background = "#bd93f9"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#282a36"
background = "#f8f8f2"

[colors.selection]
text = "#f8f8f2"
background = "#44475a"

[colors.normal]
black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

[colors.bright]
black = "#6272a4"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"

[colors.dim]
black = "#14151c"
red = "#b33c3c"
green = "#38af56"
yellow = "#a9af62"
blue = "#8467ae"
magenta = "#b3558a"
cyan = "#61a3b1"
white = "#b8b8b2"

[[colors.indexed_colors]]
index = 16
color = "#ffb86c"

[[colors.indexed_colors]]
index = 17
color = "#ff79c6"

[colors]
transparent_background_colors = false
draw_bold_text_with_bright_colors = false

[bell]
animation = "Linear"
duration = 0
color = "#f1fa8c"
command = "None"

[selection]
semantic_escape_chars = ",`|:\"' ()[]{}<>\t"
save_to_clipboard = false

[cursor]
style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }
blink_interval = 500
blink_timeout = 15
unfocused_hollow = true
thickness = 0.15

[terminal]
osc52 = "OnlyCopy"

[mouse]
hide_when_typing = true
bindings = [
  { mouse = "Right", mods = "Control", action = "Paste" },
  { mouse = "Middle", mode = "~Vi", action = "PasteSelection" },
]

[hints]
alphabet = "sadfjklewcmpgh"

[[hints.enabled]]
regex = '''(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\s<>"{}|\\^`]+'''
hyperlinks = true
post_processing = true
persist = false
command = "xdg-open"
binding = { key = "U", mods = "Control|Shift" }
mouse = { mods = "Control", enabled = true }

[[hints.enabled]]
regex = '''[A-Za-z0-9._~+/-]+:[0-9]+(:[0-9]+)?'''
post_processing = false
persist = false
action = "Copy"
binding = { key = "Y", mods = "Control|Shift" }

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", mode = "~Vi", action = "Paste" },
  { key = "V", mods = "Control|Shift", mode = "Vi|Search", action = "Paste" },
  { key = "Insert", mods = "Shift", action = "PasteSelection" },

  { key = "F", mods = "Control|Shift", mode = "~Search", action = "SearchForward" },
  { key = "B", mods = "Control|Shift", mode = "~Search", action = "SearchBackward" },
  { key = "Space", mods = "Control|Shift", mode = "~Search", action = "ToggleViMode" },

  { key = "PageUp", mods = "Shift", mode = "~Alt", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", mode = "~Alt", action = "ScrollPageDown" },
  { key = "Home", mods = "Shift", mode = "~Alt", action = "ScrollToTop" },
  { key = "End", mods = "Shift", mode = "~Alt", action = "ScrollToBottom" },

  { key = "=", mods = "Control", action = "IncreaseFontSize" },
  { key = "+", mods = "Control", action = "IncreaseFontSize" },
  { key = "NumpadAdd", mods = "Control", action = "IncreaseFontSize" },
  { key = "-", mods = "Control", action = "DecreaseFontSize" },
  { key = "NumpadSubtract", mods = "Control", action = "DecreaseFontSize" },
  { key = "0", mods = "Control", action = "ResetFontSize" },
  { key = "Numpad0", mods = "Control", action = "ResetFontSize" },

  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "T", mods = "Alt", action = "CreateNewWindow" },
  { key = "F11", action = "ToggleFullscreen" },
  { key = "F", mods = "Alt", action = "ToggleFullscreen" },
  { key = "M", mods = "Alt", action = "ToggleMaximized" },
  { key = "Q", mods = "Alt", action = "Quit" },
  { key = "Q", mods = "Control|Shift", action = "Quit" },
  { key = "Backspace", mods = "Control|Shift", action = "ClearHistory" },
  { key = "L", mods = "Control|Shift", action = "ClearLogNotice" },
]

[debug]
render_timer = false
persistent_logging = false
log_level = "Warn"
renderer = "None"
print_events = false
highlight_damage = false
prefer_egl = false
