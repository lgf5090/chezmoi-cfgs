# ============================================================
#  PSMUX 配置 — Catppuccin Mocha  |  Windows 原生 · 美观高效
#  psmux / pmux / tmux 三个命令完全等价
#
#  配置文件搜索顺序（放任意一处即可）:
#    1. ~/.psmux.conf        ← 推荐
#    2. ~/.psmuxrc
#    3. ~/.tmux.conf
#    4. ~/.config/psmux/psmux.conf
# ============================================================


# ── 基础设置 ─────────────────────────────────────────────────
# Windows 无 tmux-256color terminfo
set -g -q default-terminal "xterm-256color"
# 消除 ESC 延迟
set -g escape-time 0
# 滚动缓冲行数
set -g history-limit 10000
# 窗口从 1 编号
set -g base-index 1
# 面板从 1 编号
set -g pane-base-index 1
# 关闭窗口后自动重排编号
set -g renumber-windows on
# 启用鼠标
set -g mouse on
# 传递焦点事件（Neovim 需要）
set -g focus-events on
# 更新宿主终端标题栏
set -g set-titles on
# 标题格式：会话名 · 窗口名
set -g set-titles-string " #S · #W"


# ── psmux Windows 专属选项 ────────────────────────────────────
# 默认 Shell：PowerShell 7
# 其他可选值: cmd / powershell / nu / wsl
set -g default-shell pwsh
# 光标样式：bar（竖线）/ block / underline
set -g cursor-style bar
# 光标闪烁
set -g cursor-blink on
# 关闭预测文字变暗（兼容 Neovim / Helix）
set -g prediction-dimming off
# 关闭 Ctrl+V 拦截，让 Neovim 等接管
set -g paste-detection off
# 松开鼠标即复制（tmux 风格）
set -g pwsh-mouse-selection on
# 滚轮自动进入复制模式
set -g scroll-enter-copy-mode on
# 预启动 shell，新建面板几乎瞬间完成
set -g -q warm on
# 会话选择器默认展示实时预览
set -g choose-tree-preview on
# 与系统剪贴板同步
set -g set-clipboard on
# 双击选词分隔符
set -g word-separators " -_@./\\:"

# ── Prefix 键  C-b → C-a ─────────────────────────────────────
unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix


# ── 配置热重载 ────────────────────────────────────────────────
# bind-key r source-file "~/.config/psmux/psmux.conf" \; display-message " Config reloaded"


# ── 面板分割 ─────────────────────────────────────────────────
unbind-key '"'
unbind-key %
# 水平分割（左右）
bind-key | split-window -h
# 垂直分割（上下）
bind-key - split-window -v
# 新建窗口
bind-key c new-window


# ── Vim 风格面板导航 ──────────────────────────────────────────
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# ── 面板大小调整（-r 表示可连续按）──────────────────────────
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5


# ── 窗口导航 ─────────────────────────────────────────────────
# 切换上个窗口
bind-key Tab   last-window
bind-key -r n  next-window
bind-key -r p  previous-window


# ── 会话管理 ─────────────────────────────────────────────────
# 快速新建会话
bind-key N new-session
# 会话列表（含实时预览）
bind-key S choose-session
# 会话 / 窗口 / 面板树
bind-key W choose-tree -Zs


# ── 面板与窗口操作 ────────────────────────────────────────────
# 全屏 / 恢复当前面板
bind-key z resize-pane -Z
# 标记面板（配合 join-pane 使用）
bind-key m select-pane -m
# 关闭面板（无确认）
bind-key x kill-pane
# 关闭窗口（无确认）
bind-key X kill-window
# 关闭当前会话
bind-key Q kill-session


# ── 开发布局（prefix + D）────────────────────────────────────
# 左 65%：主编辑区   右上 70%：辅助终端   右下 30%：日志/监控
bind-key D \
  split-window -h -p 35 \; \
  split-window -v -p 30 \; \
  select-pane -t 0


# ── 复制模式（vi 键位）───────────────────────────────────────
set -g mode-keys vi
bind-key Enter copy-mode
bind-key -T copy-mode-vi v      send-keys -X begin-selection
bind-key -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y      send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H      send-keys -X start-of-line
bind-key -T copy-mode-vi L      send-keys -X end-of-line
bind-key -T copy-mode-vi q      send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel


# ══════════════════════════════════════════════════════════════
#  Catppuccin Mocha theme for psmux 3.3.x
#  Keep this section parser-friendly: no inline comments, no continuations,
#  no external status commands, and only options supported by psmux --help.
# ══════════════════════════════════════════════════════════════

# ── 状态栏全局 ────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 90
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# ── 左侧：会话 + 主机 ────────────────────────────────────────
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#313244,fg=#cba6f7] #[bg=#313244,fg=#bac2de] #h #[bg=#1e1e2e,fg=#313244] "

# ── 窗口标签 ─────────────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format "#[bg=#313244,fg=#7f849c] #I:#W#F #[bg=#1e1e2e,fg=#313244] "
set -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W#F #[bg=#1e1e2e,fg=#89b4fa] "
set -g window-status-style "bg=#313244,fg=#7f849c"
set -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g window-status-activity-style "bg=#1e1e2e,fg=#fab387,bold"
set -g window-status-bell-style "bg=#1e1e2e,fg=#f38ba8,bold"
set -g window-status-last-style "bg=#45475a,fg=#cdd6f4"

# ── 右侧：时间 + 日期 ────────────────────────────────────────
set -g status-right "#[fg=#94e2d5] %H:%M #[fg=#6c7086] | #[fg=#89b4fa] %Y-%m-%d "

# ── 面板边框 ─────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7,bold"
set -g pane-border-hover-style "fg=#89b4fa"

# ── 消息 / 命令行 / 复制模式 ─────────────────────────────────
set -g message-style "bg=#313244,fg=#f9e2af,bold"
set -g message-command-style "bg=#313244,fg=#89b4fa"
set -g mode-style "bg=#cba6f7,fg=#1e1e2e,bold"
set -g clock-mode-colour "#89b4fa"
set -g clock-mode-style 24


# ── 活动与铃声监控 ────────────────────────────────────────────
# 非活动窗口有新输出时标记
set -g monitor-activity on
# 不在状态栏弹消息，只改变标签颜色
set -g visual-activity off
# 仅非当前窗口的铃声才转发给宿主终端
set -g bell-action other
set -g visual-bell off
