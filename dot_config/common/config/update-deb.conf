# ============================================================
# update-deb.sh 配置文件
# ============================================================
# 用法：
#   ./update-deb.sh --config ./update-deb.conf <子命令> [选项]
#   或放到默认位置：~/.config/update-deb/config
#
# 语法：KEY=VALUE（# 开头为注释，值可加引号也可不加）
# 布尔值：1=启用, 0=禁用
# 命令行参数会覆盖此处的设置
# ============================================================


# -------------------- 基础设置 --------------------

# 目标 GitHub 仓库（owner/repo 格式）
# 单仓库时使用；命令行 -r/--repo 覆盖
REPO="esengine/DeepSeek-Reasonix"

# 多仓库列表（逗号分隔，owner/repo 格式）
# 支持 install/uninstall/list/list-assets/list-deb 子命令；
# check/info 在多仓库模式下不可用
# 命令行 -r 可多次指定或逗号分隔，会追加到此列表
# 示例：REPOS="esengine/DeepSeek-Reasonix,2dust/v2rayN,edison7009/EchoBird"
# 留空则回退到 REPO 单仓库
REPOS=""
# REPOS=(
#   "esengine/DeepSeek-Reasonix"
#   "edison7009/EchoBird"
#   "farion1231/cc-switch"
#   "t8y2/dbx"
#   "hiddify/hiddify-app"
#   "OneOhCloud/OneBox"
#   "2dust/v2rayn"
#   "clash-verge-rev/clash-verge-rev"
#   "chen08209/FlClash"
#   "mihomo-party-org/clash-party"
#   "libnyanpasu/clash-nyanpasu"
# )

# Release tag 前缀（用于版本号提取和 tag 拼接）
# 例如 "desktop-v" 对应 tag "desktop-v1.2.3"；无前缀留空 ""
# 注意：多仓库模式下所有仓库共享同一前缀
# 命令行 --tag-prefix 覆盖
TAG_PREFIX="desktop-v"


# -------------------- 网络设置 --------------------

# HTTP 请求超时（秒）
# 影响 GitHub API 查询和下载连接超时
# 命令行 --timeout 覆盖
TIMEOUT=30

# 代理地址（支持 http/https/socks）
# 设置后会导出为 http_proxy/https_proxy 环境变量
# 命令行 --proxy 覆盖
PROXY="http://127.0.0.1:2080"


# -------------------- 缓存设置 --------------------

# 缓存目录（下载的 .deb 文件存放位置）
# 命令行 --cache-dir 覆盖
CACHE_DIR="${HOME}/.cache/update-deb"

# 安装后保留缓存（0=删除, 1=保留）
# 保留后下次安装相同版本会复用缓存，避免重复下载
# 命令行 --keep-cache 覆盖
KEEP_CACHE=1

# 校验下载文件的 sha256（0=禁用, 1=启用）
# 启用后会校验 GitHub API 返回的 digest
# 命令行 --verify-checksum 覆盖
VERIFY_CHECKSUM=1

# 断点续传（0=禁用, 1=启用）
# 启用后对已下载的部分文件继续下载（curl -C - / wget -c）
# 命令行 --resume 覆盖
RESUME=1


# -------------------- 显示设置 --------------------

# 禁用颜色输出（0=彩色, 1=无色）
# 适合管道或日志场景
# 命令行 --no-color 覆盖
NO_COLOR=0

# 安静模式（0=正常, 1=仅输出错误和关键信息）
# 命令行 -q/--quiet 覆盖
QUIET=0

# 调试模式（0=关闭, 1=输出详细调试信息到 stderr）
# 命令行 -V/--verbose 覆盖
VERBOSE=0


# -------------------- list 子命令设置 --------------------

# list 子命令默认显示的 release 条数
# 设为 0 表示显示所有
# 命令行 --limit 覆盖
LIST_LIMIT=10
