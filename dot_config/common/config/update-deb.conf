# update-deb configuration
#
# Target path after chezmoi apply:
#   ~/.config/common/config/update-deb.conf
#
# This file is sourced by update-deb.sh as Bash code. Keep assignments quoted
# when values contain shell metacharacters, spaces, or regular expressions.
# Command-line options override values from this file where applicable.

# Default single repository. Used when REPOS is empty and no -r/--repo option is
# passed. Format: owner/repo.
REPO="esengine/DeepSeek-Reasonix"

# Optional multi-repository default. Leave empty for single-repository mode.
# Multi-repository mode always uses each repository's latest release; do not use
# TARGET_VERSION or TARGET_TAG with multiple repositories.
# REPOS=()
# Example:
REPOS=(
  "esengine/DeepSeek-Reasonix"
  "edison7009/EchoBird"
  "farion1231/cc-switch"
  "t8y2/dbx"
  "hiddify/hiddify-app"
  "2dust/v2rayn"
)

# Tag prefix used when --version is supplied, and stripped when inferring the
# release version from tag_name. The default repository uses desktop-v1.2.3.
TAG_PREFIX="desktop-v"

# Optional fixed release selection. Prefer command-line --version/--tag for
# one-off use. Keep both empty for latest release.
TARGET_VERSION=""
TARGET_TAG=""

# Optional local Debian package name override. Empty means auto-detect from the
# GitHub repository name and installed dpkg package list.
PACKAGE_NAME=""

# Optional asset selection overrides.
# ASSET_NAME matches an exact release asset filename.
# ASSET_REGEX is a case-insensitive regular expression tested against asset
# filenames. ASSET_NAME has priority over ASSET_REGEX; both have priority over
# architecture auto-detection.
ASSET_NAME=""
ASSET_REGEX=""
# Example:
# ASSET_REGEX="(amd64|x64).*\\.deb$"

# Optional architecture override. Empty means dpkg --print-architecture.
# Common values: amd64, arm64, armhf, i386.
ARCH=""

# Installation method:
#   apt  - recommended; installs local deb with dependency resolution.
#   dpkg - runs dpkg -i first, then apt-get install -f if needed.
INSTALL_METHOD="apt"

# Cache and output.
CACHE_DIR="${XDG_CACHE_HOME:-$HOME/.cache}/update-deb"
OUTPUT_DIR=""

# Behavior flags. Values are 0 or 1.
FORCE=0
ASSUME_YES=0
DRY_RUN=0
LIST_ASSETS=0
DOWNLOAD_ONLY=0
NO_CACHE=0
INCLUDE_PRERELEASE=0
KEEP_TEMP=0
CLEAN_CACHE=0
