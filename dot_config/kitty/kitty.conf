# vim:fileencoding=utf-8:ft=kitty

# Fonts
font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
disable_ligatures cursor
box_drawing_scale 0.001, 1, 1.5, 2
modify_font underline_thickness 150%

# Cursor
cursor                  #f8f8f2
cursor_text_color       #282a36
cursor_shape            beam
cursor_shape_unfocused  hollow
cursor_beam_thickness   1.5
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 1.0

# Mouse, selection and URLs
mouse_hide_wait 1.5
focus_follows_mouse no
copy_on_select no
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#
url_style curly
url_color #8be9fd
open_url_with default
detect_urls yes
show_hyperlink_targets no
underline_hyperlinks hover
allow_hyperlinks yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab "!"

# Window
remember_window_size no
initial_window_width 120c
initial_window_height 34c
enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical
window_border_width 0.5pt
draw_minimal_borders yes
window_padding_width 10
single_window_padding_width 10
placement_strategy center
active_border_color #bd93f9
inactive_border_color #44475a
bell_border_color #ff5555
inactive_text_alpha 0.92
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 0.96
dynamic_background_opacity yes
background_blur 0

# Tabs
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 1
tab_bar_align left
tab_switch_strategy previous
tab_title_template " {index}: {title} "
active_tab_foreground #282a36
active_tab_background #bd93f9
active_tab_font_style bold
inactive_tab_foreground #f8f8f2
inactive_tab_background #44475a
inactive_tab_font_style normal
tab_bar_background #282a36
tab_activity_symbol "+"

# Shell and integration
term xterm-kitty
shell_integration enabled
allow_remote_control no
linux_display_server auto
wayland_enable_ime yes
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 512

# Dracula
foreground #f8f8f2
background #282a36
selection_foreground #f8f8f2
selection_background #44475a

color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

mark1_foreground #282a36
mark1_background #50fa7b
mark2_foreground #282a36
mark2_background #ff79c6
mark3_foreground #282a36
mark3_background #8be9fd

# Key bindings
kitty_mod ctrl+shift

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert paste_from_selection

map ctrl+shift+f search_scrollback
map ctrl+shift+u open_url_with_hints
map ctrl+shift+y kitten hints --type url --program @
map ctrl+shift+i kitten unicode_input

map ctrl+equal change_font_size all +1.0
map ctrl+plus change_font_size all +1.0
map ctrl+kp_add change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+kp_subtract change_font_size all -1.0
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

map alt+enter launch --cwd=current --location=vsplit
map alt+backslash launch --cwd=current --location=hsplit
map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

map alt+t new_tab !neighbor
map alt+w close_tab
map alt+[ previous_tab
map alt+] next_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

map f11 toggle_fullscreen
map alt+f toggle_fullscreen
map alt+q quit
map ctrl+shift+q quit

map ctrl+shift+n new_os_window_with_cwd
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+backspace clear_terminal reset active
map ctrl+shift+l clear_terminal to_cursor active
