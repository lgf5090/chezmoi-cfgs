# ============================================================
#  RMUX 配置  —  Catppuccin Mocha  |  实用 · 美观 · 高效
#  兼容 RMUX v0.2.5+（tmux 4.0.1 命令集）
#  配置文件位置（搜索优先级）:
#    ~/.config/rmux/rmux.conf  >  ~/.rmux.conf  >  ~/.tmux.conf


## Configuration

# On Linux and macOS, RMUX reads `.rmux.conf` from the standard system and user locations:

# 1. `/etc/rmux.conf`
# 2. `~/.rmux.conf`
# 3. `$XDG_CONFIG_HOME/rmux/rmux.conf`
# 4. `~/.config/rmux/rmux.conf`

# On Windows, RMUX reads `.rmux.conf` from:

# 1. `%XDG_CONFIG_HOME%\rmux\rmux.conf`
# 2. `%USERPROFILE%\.rmux.conf`
# 3. `%APPDATA%\rmux\rmux.conf`
# 4. `%RMUX_CONFIG_FILE%`
# ============================================================

# ── 基础设置 ─────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -g escape-time 0                               # 消除 ESC 延迟
set -g history-limit 10000
set -g base-index 1                                # 窗口从 1 编号
set -g pane-base-index 1                           # 面板从 1 编号
set -g renumber-windows on
set -g mouse on
set -g focus-events on
setw -g aggressive-resize on
# set -g default-command "cmd"


# ── Prefix 键  C-b → C-a ─────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ── 快捷键 ──────────────────────────────────────────────────
# 重载配置
# bind r source-file ~/.tmux.conf \; display "✓ rmux config reloaded"

# 分割面板（保持当前路径）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 新窗口保持路径
bind c new-window -c "#{pane_current_path}"

# Vim 风格面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 面板大小调整（可重复）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 切换上个窗口
bind Tab last-window

# 关闭面板 / 窗口（无确认）
bind x kill-pane
bind X kill-window

# 快速新建会话
bind N new-session

# 选择会话列表
bind S choose-session

# 复制模式（vi 键位）
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi q   send -X cancel


# ── Catppuccin Mocha 调色板（注释参考）───────────────────────
# Base #1e1e2e  Surface0 #313244  Surface1 #45475a
# Text #cdd6f4  Subtext  #bac2de  Overlay1 #7f849c
# Blue #89b4fa  Mauve    #cba6f7  Teal     #94e2d5
# Sky  #89dceb  Peach    #fab387  Yellow   #f9e2af


# ── 状态栏 ───────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 50
set -g status-right-length 120


# 左侧：会话名
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] 󱂬 #S #[bg=#1e1e2e,fg=#89b4fa] "


# 窗口标签
setw -g window-status-separator ""
setw -g window-status-format "#[bg=#313244,fg=#bac2de]  #I  #W  #[bg=#1e1e2e,fg=#313244]"
setw -g window-status-current-format "#[bg=#1e1e2e,fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e,bold] #I  #W #[bg=#1e1e2e,fg=#cba6f7] "


# 右侧：时间 · 日期 · 主机（精简版，排查兼容性）
set -g status-right "#[fg=#94e2d5] %H:%M #[fg=#7f849c] | #[fg=#89dceb] %Y-%m-%d #[fg=#89b4fa] #H "


# ── 面板边框 ─────────────────────────────────────────────────
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#cba6f7,bold"
set -g pane-border-lines single


# ── 消息 / 命令行 ─────────────────────────────────────────────
set -g message-style "bg=#313244,fg=#f9e2af,bold"
set -g message-command-style "bg=#313244,fg=#89b4fa"


# ── 复制模式高亮 ──────────────────────────────────────────────
setw -g mode-style "bg=#cba6f7,fg=#1e1e2e,bold"


# ── 时钟（prefix + t）────────────────────────────────────────
setw -g clock-mode-colour "#89b4fa"
setw -g clock-mode-style 24


# ── 活动窗口提示 ──────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#fab387,bg=#1e1e2e,bold"